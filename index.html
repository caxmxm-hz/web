<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feliz cumpleaños Micaela</title>

  <!-- Fuente tipo deportiva -->
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <style>
    :root{
      --maxWidth:1000px;
    }

    html,body{
      height:100%;
      margin:0;
      font-family: "Russo One", sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#072033;
      overflow-x:hidden;
      background: linear-gradient(180deg, #ffe9f1 0%, #ffdff0 30%, #ffecf6 60%, #fff6fb 100%);
    }

    /* SVG decorativo (motivos de hojas y flores) está en el body, debajo de todo */
    svg.decor{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:-3;
      pointer-events:none;
      display:block;
      opacity:0.95;
      mix-blend-mode:normal;
    }

    /* Un leve overlay para dar profundidad */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.02));
      pointer-events:none;
    }

    .page{
      width:100%;
      max-width:var(--maxWidth);
      padding:20px;
      box-sizing:border-box;
      text-align:center;
    }

    /* Título: cada palabra en su propia línea, colores pastel sólidos (no transparente) */
    .title{
      font-size:clamp(30px,6vw,68px);
      margin:0 0 18px 0;
      letter-spacing:1.5px;
      /* quitar background-clip y texto transparente para que sea opaco */
      color: #ff6f9b; /* fallback */
      text-shadow: 0 1px 6px rgba(0,0,0,0.04);
      transform: skewX(-3deg);
      line-height:0.92;
      display:inline-block;
      text-align:center;
    }
    .title span{
      display:block; /* cada palabra en su propia línea */
      padding:2px 0;
    }
    /* Colores individuales por línea (pastel, opacos) */
    .title span:nth-child(1){ color: #ff00bf; } /* Feliz */
    .title span:nth-child(2){ color: #ff00a8; } /* cumpleaños */
    .title span:nth-child(3){ color: #d600e9; } /* Micaela */

    /* Contenedor del video: proporción horizontal aproximada 3:2 */
    .video-wrapper{
      position:relative;
      width:100%;
      aspect-ratio:3/2;
      max-height:75vh;
      border-radius:14px;
      overflow:hidden;
      box-shadow: 0 18px 40px rgba(9,20,30,0.12);
      background: rgba(255,255,255,0.45);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter: blur(4px) saturate(1.02);
    }

    /* Video ajustado para verse todo dentro del contenedor */
    .video-wrapper video{
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain; /* muestra el video entero sin recortar */
      display:block;
      z-index:1;
      position:relative;
      background: transparent;
    }

    /* Capas encima del video */
    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:3;
      overflow:hidden;
    }

    .balloons{ position:absolute; inset:0; z-index:4; }
    .snow{ position:absolute; inset:0; z-index:5; }

    .balloon{
      position:absolute;
      bottom:-22%;
      border-radius:50%;
      opacity:0.68;
      mix-blend-mode:screen;
      box-shadow: inset -6px -8px 18px rgba(0,0,0,0.12);
      transform-origin:center;
      width:var(--size);
      height:var(--size);
      left:var(--left);
      animation:
        rise var(--dur) linear infinite var(--delay),
        sway var(--swayDur) ease-in-out infinite var(--delay);
      backdrop-filter: blur(0.5px);
      will-change: top, transform;
    }

    .balloon::before{
      content:"";
      position:absolute;
      left:12%;
      top:8%;
      width:46%;
      height:32%;
      border-radius:40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.05) 40%, transparent 70%);
      mix-blend-mode:screen;
      opacity:0.95;
      transform:rotate(-12deg);
    }

    @keyframes rise{ from { top:110%; } to   { top:-40%; } }
    @keyframes sway{ from { transform: translateX(-20px) rotate(-6deg); } to   { transform: translateX(20px) rotate(6deg); } }

    .flake{
      position:absolute;
      top:-10%;
      width:var(--fsize);
      height:var(--fsize);
      left:var(--fleft);
      background:var(--fcolor);
      opacity:var(--fopacity);
      transform: rotate(var(--frot));
      border-radius:2px;
      mix-blend-mode:screen;
      animation: fall var(--fdur) linear infinite var(--fdelay);
      will-change: top, transform;
      z-index:6;
    }

    @keyframes fall{
      from { top:-15%; transform: translateY(0) rotate(0deg); }
      to   { top:115%; transform: translateY(40px) rotate(360deg); }
    }

    .caption{
      margin-top:14px;
      font-size:14px;
      color:#05314a;
      opacity:0.95;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    @media (max-width:420px){
      .title{ font-size:28px; }
      .video-wrapper{ border-radius:10px; }
    }
  </style>
</head>
<body>
  <!-- SVG en línea para motivos repetidos (pequeñas hojas y flores) sobre el fondo rosado -->
  <svg class="decor" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 1920 1080" aria-hidden="true" focusable="false">
    <defs>
      <!-- Símbolos reutilizables: hoja y floret -->
      <symbol id="leaf" viewBox="0 0 24 24" width="24" height="24" >
        <path d="M2 12c6-8 14-9 20-10-3 6-5 14-10 18C7 20 3 16 2 12z"
              fill="#bdeecb"/>
      </symbol>

      <symbol id="flower" viewBox="0 0 24 24" width="24" height="24">
        <!-- cuatro pétalos simples -->
        <g fill="#fff6f9">
          <ellipse cx="12" cy="6" rx="3.2" ry="4" transform="rotate(0 12 6)"/>
          <ellipse cx="18" cy="12" rx="3.2" ry="4" transform="rotate(90 18 12)"/>
          <ellipse cx="12" cy="18" rx="3.2" ry="4" transform="rotate(180 12 18)"/>
          <ellipse cx="6" cy="12" rx="3.2" ry="4" transform="rotate(270 6 12)"/>
        </g>
        <circle cx="12" cy="12" r="2" fill="#ffd1e8"/>
      </symbol>

      <!-- patrón repetido que mezcla hojas y flores en una pequeña celda -->
      <pattern id="motifs" patternUnits="userSpaceOnUse" width="120" height="120">
        <!-- fondo semi-transparente de la celda para dar variación -->
        <rect width="120" height="120" fill="transparent"/>
        <!-- instancias en distintas posiciones/rotaciones/escala -->
        <use href="#leaf" x="8"  y="12" transform="scale(0.6) rotate(-12 20 20)" opacity="0.55"/>
        <use href="#leaf" x="72" y="18" transform="scale(0.45) rotate(22 72 18)" opacity="0.42"/>
        <use href="#leaf" x="18" y="78" transform="scale(0.5) rotate(-38 18 78)" opacity="0.48"/>
        <use href="#flower" x="48" y="48" transform="scale(0.6) rotate(14 60 60)" opacity="0.72"/>
        <use href="#flower" x="92" y="82" transform="scale(0.45) rotate(-20 92 82)" opacity="0.55"/>
        <use href="#flower" x="6" y="92" transform="scale(0.35) rotate(8 6 92)" opacity="0.45"/>
      </pattern>
      <!-- filtro de grano muy sutil -->
      <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="1" stitchTiles="stitch" result="n" />
        <feColorMatrix type="saturate" values="0" result="mono"/>
        <feComponentTransfer in="mono" result="a"><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer>
        <feBlend in="SourceGraphic" in2="a" mode="overlay"/>
      </filter>
    </defs>

    <!-- Manchas grandes y suaves en tonos rosados para el "rozado" -->
    <rect x="-10" y="-10" width="1940" height="1100" fill="#fff0f8" />
    <ellipse cx="300" cy="250" rx="520" ry="320" fill="#ffe3f0" opacity="0.95"/>
    <ellipse cx="1400" cy="200" rx="420" ry="260" fill="#ffdced" opacity="0.9"/>
    <ellipse cx="960" cy="820" rx="600" ry="300" fill="#fff1f6" opacity="0.9"/>

    <!-- capa de motivos repetidos (hojas y florecitas) -->
    <rect x="0" y="0" width="1920" height="1080" fill="url(#motifs)" opacity="0.55" />

    <!-- capa de grano sutil -->
    <rect x="0" y="0" width="1920" height="1080" fill="transparent" filter="url(#grain)" />
  </svg>

  <div class="page">
    <h1 class="title">
      <span>Feliz</span>
      <span>cumpleaños</span>
      <span>Micaela</span>
    </h1>

    <div class="video-wrapper" aria-label="Video de cumpleaños">
      <!-- Reemplaza 'video.mp4' por la ruta o URL de tu vídeo horizontal -->
      <video id="bgvideo" autoplay muted loop playsinline>
        <source src="volleyball-demonst.mp4" type="video/mp4">
        Tu navegador no soporta vídeo.
      </video>

      <div class="overlay">
        <div class="balloons" id="balloonContainer"></div>
        <div class="snow" id="snowContainer"></div>
      </div>
    </div>

    <div class="caption">Jesucristo te ama mucho Micaela 🎉</div>
  </div>

  <script>
    (function(){
      const balloonContainer = document.getElementById('balloonContainer');
      const snowContainer = document.getElementById('snowContainer');

      const colors = [
        'rgba(255,150,180,0.56)',
        'rgba(255,200,150,0.56)',
        'rgba(255,240,150,0.52)',
        'rgba(170,240,210,0.52)',
        'rgba(160,220,255,0.52)',
        'rgba(210,180,255,0.52)'
      ];

      function rand(min,max){ return Math.random()*(max-min)+min; }

      // Globos
      const balloonCount = 30;
      for(let i=0;i<balloonCount;i++){
        const b = document.createElement('div');
        b.className = 'balloon';
        const size = Math.round(rand(40,110)) + 'px';
        const left = Math.round(rand(0,100)) + '%';
        const dur = rand(8,22) + 's';
        const delay = '-' + Math.round(rand(0,20)) + 's';
        const swayDur = rand(3,6) + 's';
        const color = colors[Math.floor(rand(0,colors.length))];

        b.style.setProperty('--size', size);
        b.style.setProperty('--left', left);
        b.style.setProperty('--dur', dur);
        b.style.setProperty('--delay', delay);
        b.style.setProperty('--swayDur', swayDur);
        b.style.background = `radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95) 0%, ${color} 35%, rgba(0,0,0,0.03) 100%)`;
        b.style.opacity = rand(0.55,0.85).toFixed(2);
        b.style.transform = `translateX(0) rotate(${rand(-10,10)}deg)`;
        balloonContainer.appendChild(b);
      }

      // Cuadraditos (nieve)
      const flakeCount = 140;
      for(let i=0;i<flakeCount;i++){
        const f = document.createElement('div');
        f.className = 'flake';
        const fsize = Math.round(rand(4,14)) + 'px';
        const fleft = Math.round(rand(0,100)) + '%';
        const fdur = rand(4,12) + 's';
        const fdelay = '-' + Math.round(rand(0,12)) + 's';
        const fcolor = colors[Math.floor(rand(0,colors.length))];
        const fopacity = (rand(0.45,0.95)).toFixed(2);
        const frot = Math.round(rand(-120,120)) + 'deg';

        f.style.setProperty('--fsize', fsize);
        f.style.setProperty('--fleft', fleft);
        f.style.setProperty('--fdur', fdur);
        f.style.setProperty('--fdelay', fdelay);
        f.style.setProperty('--fcolor', fcolor);
        f.style.setProperty('--fopacity', fopacity);
        f.style.setProperty('--frot', frot);

        if(Math.random() < 0.25) f.style.borderRadius = '3px';
        snowContainer.appendChild(f);
      }

      // Forzar reproducción en navegadores que lo permitan (autoplay necesita muted)
      const video = document.getElementById('bgvideo');
      function tryPlay(){
        const p = video.play();
        if(p && p.catch) p.catch(()=>{/* ignore */});
      }
      tryPlay();
      document.addEventListener('click', tryPlay, {once:true});
      document.addEventListener('touchstart', tryPlay, {once:true});
    })();
  </script>
</body>
</html>
